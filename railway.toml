[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "daphne -b 0.0.0.0 -p $PORT playground.asgi:application"
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[deploy.regions]]
region = "us-east"
cpuLimit = 250
memoryLimit = 256
